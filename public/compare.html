<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>เทียบเครื่องวัด · ห้องเก็บสีย้อม</title>
<script src="theme.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="chart.umd.min.js"></script>
<style>
  /* compare-only bits — isolated here so the shared design system stays untouched */
  .cmp-legend{display:flex;flex-wrap:wrap;gap:10px 16px;justify-content:center;margin-top:6px;padding:0 6px;font-size:12.5px}
  .cmp-legend .item{display:inline-flex;align-items:center;gap:7px;color:var(--ink2);font-weight:600}
  .cmp-legend .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .cmp-legend .av{color:var(--muted);font-weight:500}
  .hdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle;flex:0 0 auto}
  thead th .hdot{margin-right:5px}
  tbody tr.out td{background:var(--err-bg)}
  td .warnmark{color:var(--alert);font-weight:700;margin-left:4px}
  .delta.pos{color:var(--temp-d)} .delta.neg{color:var(--hum-d)}
  [data-theme="dark"] .delta.pos{color:#fb923c} [data-theme="dark"] .delta.neg{color:#38bdf8}
  .subtitle{color:var(--muted);font-size:13.5px;margin-top:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="ic">🎨</span> ห้องเก็บสีย้อม</div>
    <div class="top-actions">
      <button class="navbtn theme-toggle" type="button" aria-label="สลับโหมดสว่าง/มืด"><span data-theme-icon>🌙</span></button>
      <a class="navbtn" href="index.html">← แดชบอร์ด</a>
    </div>
  </div>
  <h1>เทียบเครื่องวัด</h1>
  <div class="subtitle" id="subInfo">เครื่องวัดในห้องเดียวกันอ่านค่าตรงกันไหม</div>

  <div class="rangebar" id="metricbar" style="margin-top:14px">
    <button data-metric="hum" class="active">💧 ความชื้น</button>
    <button data-metric="temp">🌡️ อุณหภูมิ</button>
    <button data-metric="dew">🌫️ จุดน้ำค้าง</button>
  </div>

  <div class="rangebar" id="rangebar">
    <button data-range="day">วัน</button>
    <button data-range="week">สัปดาห์</button>
    <button data-range="month" class="active">เดือน</button>
    <button data-range="year">ปี</button>
  </div>

  <div class="pernav">
    <button class="arrow" id="prev" aria-label="ก่อนหน้า">‹</button>
    <div class="picker">
      <span class="lab" id="pickerLab">เดือน</span>
      <input type="month" id="picker">
    </div>
    <button class="arrow" id="next" aria-label="ถัดไป">›</button>
  </div>

  <div id="content">
    <div class="note"><div class="spin"></div></div>
  </div>

  <footer>เซนเซอร์ Inkbird IBS-TH3-PLUS · เครื่องในห้องเดียวกันควรอ่านใกล้กัน (เกณฑ์อิงความแม่น ±3%RH, ±0.5°C)</footer>
</div>
<div id="cmpTip" class="cmptip" hidden></div>
<script type="module" src="compare.js"></script>
</body>
</html>
